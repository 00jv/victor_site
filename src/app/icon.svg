<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Outer circular background matching the dark site theme -->
  <circle cx="16" cy="16" r="15" fill="#06040a" stroke="#bd00ff" stroke-width="1.5" style="stroke: var(--color-primary, #bd00ff);" />
  
  <!-- Inner cyber circle -->
  <circle cx="16" cy="16" r="11" fill="none" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.1" />

  <!-- Initials JV in Orbitron style font -->
  <text x="16" y="17.5" dominant-baseline="middle" text-anchor="middle" font-family="monospace, sans-serif" font-size="10.5" font-weight="900" fill="#ffffff" letter-spacing="-0.5">
    JV
  </text>
  
  <!-- Neon dot with glow filter -->
  <circle cx="21.5" cy="19.5" r="1.2" fill="#bd00ff" filter="url(#glow)" style="fill: var(--color-primary, #bd00ff);" />
</svg>
